# Drop inside the existing server { } block for prod.pracpros.com
# (or include from sites-available/prod.pracpros.com).
#
# Next's basePath: "/Pracprosv3" means the app expects requests
# under /Pracprosv3/* — pass the path through unchanged.

location /Pracprosv3/ {
    proxy_pass         http://127.0.0.1:3030;
    proxy_http_version 1.1;

    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Forwarded-Host  $host;

    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        "upgrade";

    proxy_read_timeout 60s;
    proxy_buffering    off;
}

# Optional: redirect /Pracprosv3 (no trailing slash) to /Pracprosv3/
location = /Pracprosv3 {
    return 301 /Pracprosv3/;
}
