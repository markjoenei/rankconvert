name: VPS One-Shot Fix

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Run cleanup + redeploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          script_stop: true
          command_timeout: 10m
          script: |
            set -e
            APP_DIR=/var/www/Pracprosv3

            echo "== current pm2 state =="
            pm2 list || true

            echo "== installing updated deploy-next.sh to /usr/local/bin =="
            if [ -w /usr/local/bin ]; then
              cp "$APP_DIR/deploy/deploy-next.sh" /usr/local/bin/deploy-next.sh
              chmod +x /usr/local/bin/deploy-next.sh
            else
              sudo -n cp "$APP_DIR/deploy/deploy-next.sh" /usr/local/bin/deploy-next.sh
              sudo -n chmod +x /usr/local/bin/deploy-next.sh
            fi

            echo "== deleting known conflicting pm2 process: pracprosv2 =="
            pm2 delete pracprosv2 || true

            echo "== deleting errored Pracprosv3 entry so it starts fresh =="
            pm2 delete Pracprosv3 || true

            echo "== re-running deploy script =="
            /usr/local/bin/deploy-next.sh "$APP_DIR"

            echo "== final pm2 state =="
            pm2 list

            echo "== local health check =="
            curl -sI http://127.0.0.1:3030/Pracprosv3/ | head -5 || true
