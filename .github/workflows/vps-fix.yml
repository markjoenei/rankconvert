name: VPS One-Shot Fix

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Upload latest deploy script to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          source: "deploy/deploy-next.sh"
          target: "/var/www/Pracprosv3"
          strip_components: 0
          overwrite: true

      - name: Run cleanup + redeploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          script_stop: true
          command_timeout: 10m
          script: |
            set -e
            APP_DIR=/var/www/Pracprosv3

            echo "== installing updated deploy-next.sh to /usr/local/bin =="
            chmod +x "$APP_DIR/deploy/deploy-next.sh"
            if [ -w /usr/local/bin ]; then
              cp "$APP_DIR/deploy/deploy-next.sh" /usr/local/bin/deploy-next.sh
              chmod +x /usr/local/bin/deploy-next.sh
            else
              sudo -n cp "$APP_DIR/deploy/deploy-next.sh" /usr/local/bin/deploy-next.sh
              sudo -n chmod +x /usr/local/bin/deploy-next.sh
            fi

            echo "== confirming new script is in place =="
            grep -c "include=dev" /usr/local/bin/deploy-next.sh || echo "WARN: --include=dev not found in installed script"

            echo "== deleting known conflicting pm2 process: pracprosv2 =="
            pm2 delete pracprosv2 || true

            echo "== deleting any errored Pracprosv3 entry so it starts fresh =="
            pm2 delete Pracprosv3 || true

            echo "== unsetting NODE_ENV so npm ci installs devDeps =="
            unset NODE_ENV

            echo "== re-running deploy script =="
            /usr/local/bin/deploy-next.sh "$APP_DIR"

            echo "== final pm2 state =="
            pm2 list

            echo "== local health check =="
            curl -sI http://127.0.0.1:3030/Pracprosv3/ | head -5 || true
