name: VPS One-Shot Fix

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Run cleanup + redeploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          script_stop: true
          command_timeout: 10m
          script: |
            set -e
            APP_DIR=/var/www/Pracprosv3

            echo "== current pm2 state =="
            pm2 list || true

            echo "== installing updated deploy-next.sh to /usr/local/bin =="
            if [ -w /usr/local/bin ]; then
              cp "$APP_DIR/deploy/deploy-next.sh" /usr/local/bin/deploy-next.sh
              chmod +x /usr/local/bin/deploy-next.sh
            else
              sudo -n cp "$APP_DIR/deploy/deploy-next.sh" /usr/local/bin/deploy-next.sh
              sudo -n chmod +x /usr/local/bin/deploy-next.sh
            fi

            echo "== removing any conflicting pm2 process on port 3030 =="
            CONFLICTS=$(pm2 jlist | node -e '
              const apps = JSON.parse(require("fs").readFileSync(0, "utf8"));
              const names = apps
                .filter(a => a.name !== "Pracprosv3")
                .filter(a => {
                  const env = (a.pm2_env && a.pm2_env.env) || {};
                  return String(env.PORT) === "3030";
                })
                .map(a => a.name);
              process.stdout.write(names.join(" "));
            ')
            for name in $CONFLICTS; do
              echo ">> deleting $name"
              pm2 delete "$name"
            done

            echo "== re-running deploy script =="
            /usr/local/bin/deploy-next.sh "$APP_DIR"

            echo "== final pm2 state =="
            pm2 list
